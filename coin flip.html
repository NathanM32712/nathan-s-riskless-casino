<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Coin Flip</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
    }

    #coin {
      width: 10px;
      height: 100px;
      border-radius: 50%;
      transform-origin: center;
      position: relative;
      background: gray;
      z-index: 2;
    }

    #shadow {
      position: absolute;
      width: 100px;
      height: 20px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 50%;
      bottom: calc(50% - 10px);
      z-index: 1;
    }
  </style>
</head>
<body>
  <div id="shadow"></div>
  <div id="coin"></div>

  <script>
    const coin = document.getElementById('coin');
    let angle = 0;
    let baseSpeed = 30;
    let width = 10;
    let height = 100;
    let outcome = null;
    let phase = 'spin-only';
    let timeElapsed = 0;

    const loop = setInterval(() => {
      timeElapsed += 16;

      const wobble = Math.sin(timeElapsed / 300) * 10;
      const speed = baseSpeed + wobble;

      angle += speed;
      coin.style.transform = `rotate(${angle}deg)`;

      if (phase === 'spin-only') {
        if (timeElapsed >= 2500) {
          outcome = Math.random() < 0.5 ? 'red' : 'green';
          coin.style.background = outcome;
          phase = 'inflate-spin';
        }
      } else if (phase === 'inflate-spin') {
        if (width < 100) width += 0.6;
        if (height > 100) height -= 0.6;
        coin.style.width = `${width}px`;
        coin.style.height = `${height}px`;

        if (baseSpeed > 1) baseSpeed *= 0.98;
        else {
          clearInterval(loop);
          coin.style.transform = `rotate(0deg)`;
        }
      }
    }, 16);
  </script>
</body>
</html>
