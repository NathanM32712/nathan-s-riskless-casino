<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Coin Flip</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      text-align: center;
      margin: 0;
    }
    canvas {
      margin-top: 30px;
      background: #222;
      border: 2px solid #444;
      border-radius: 10px;
    }
    h1 {
      margin-top: 20px;
      font-size: 2em;
    }
    input, select, button {
      margin: 10px;
      padding: 10px;
      font-size: 1em;
      border-radius: 5px;
      border: none;
    }
    button {
      background: gold;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      font-size: 1.4em;
    }
  </style>
</head>
<body>
  <h1>🟢🔴 Coin Flip</h1>
  <div>Balance: $<span id="balance">1000</span></div>
  <input type="number" id="bet" placeholder="Bet amount" min="1" />
  <select id="choice">
    <option value="green">Green</option>
    <option value="red">Red</option>
  </select>
  <button onclick="flip()">Flip</button>
  <button onclick="goBack()">⬅️ Back</button>
  <canvas id="canvas" width="300" height="300"></canvas>
  <div id="result"></div>

  <script>
    let balance = parseInt(localStorage.getItem("coinBalance"));
    if (isNaN(balance) || balance < 0) {
      balance = 1000;
      localStorage.setItem("coinBalance", balance);
    }
    document.getElementById("balance").textContent = balance;

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let angle = 0;
    let radius = 10;
    let spinning = false;
    let finalColor = "";

    function drawSpinner() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(150, 150);
      ctx.rotate(angle);

      // Draw half green
      ctx.beginPath();
      ctx.fillStyle = "green";
      ctx.arc(0, 0, radius, 0, Math.PI, false);
      ctx.fill();

      // Draw half red
      ctx.beginPath();
      ctx.fillStyle = "red";
      ctx.arc(0, 0, radius, Math.PI, 2 * Math.PI, false);
      ctx.fill();

      ctx.restore();
    }

    function flip() {
      const bet = parseInt(document.getElementById("bet").value);
      const pick = document.getElementById("choice").value;
      if (isNaN(bet) || bet <= 0 || bet > balance) {
        alert("Invalid bet.");
        return;
      }

      balance -= bet;
      localStorage.setItem("coinBalance", balance);
      document.getElementById("balance").textContent = balance;
      document.getElementById("result").textContent = "Spinning...";

      angle = 0;
      radius = 10;
      spinning = true;
      finalColor = Math.random() < 0.5 ? "green" : "red";

      let speed = 0.3;
      let inflation = 1;

      function animate() {
        if (!spinning) return;

        angle += speed;
        radius += inflation;

        if (radius >= 150) {
          inflation = 0;
          speed *= 0.97;
          if (speed < 0.01) {
            spinning = false;
            finishFlip(pick, bet);
            return;
          }
        }

        drawSpinner();
        requestAnimationFrame(animate);
      }

      animate();
    }

    function finishFlip(pick, bet) {
      drawSpinner();
      if (pick === finalColor) {
        const win = bet * 2;
        balance += win;
        document.getElementById("result").textContent = `🎉 You chose ${pick.toUpperCase()} and won $${win}!`;
      } else {
        document.getElementById("result").textContent = `❌ It landed on ${finalColor.toUpperCase()}. You lost.`;
      }
      localStorage.setItem("coinBalance", balance);
      document.getElementById("balance").textContent = balance;
    }

    function goBack() {
      window.open("index.html", "_blank");
      window.close();
    }

    drawSpinner();
  </script>
</body>
</html>
